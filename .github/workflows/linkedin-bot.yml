name: Wolf Jansen LinkedIn Bot

on:
  schedule:
    - cron: '0 7 * * 4'   # Thursdays 07:00 UTC = 09:00 CEST (summer) / 08:00 CET (winter)
  workflow_dispatch:        # Allow manual "Run workflow" from GitHub UI

permissions:
  contents: write    # Required to commit generated images back to the repo

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser anthropic requests python-dotenv openai

      - name: Run LinkedIn bot
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          SMTP_HOST:                smtp.gmail.com
          SMTP_PORT:                "587"
          SMTP_USER:                ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:            ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM:               ${{ secrets.EMAIL_FROM }}
          EMAIL_TO:                 ${{ secrets.EMAIL_TO }}
          # Reuse the same OneDrive/Graph creds as the main bot
          MS_TENANT_ID:             ${{ secrets.MS_TENANT_ID }}
          MS_CLIENT_ID:             ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET:         ${{ secrets.MS_CLIENT_SECRET }}
          MS_USER_EMAIL:            ${{ secrets.MS_USER_EMAIL }}
          # WP lookup (so the LinkedIn post can link back to the live article)
          WP_URL:                   https://wolfjansen.com
          WP_USER:                  ${{ secrets.WP_USER }}
          WP_APP_PASSWORD:          ${{ secrets.WP_APP_PASSWORD }}
          # New secrets specific to the LinkedIn flow
          PA_LINKEDIN_APPROVE_URL:  ${{ secrets.PA_LINKEDIN_APPROVE_URL }}
          PA_LINKEDIN_REJECT_URL:   ${{ secrets.PA_LINKEDIN_REJECT_URL }}
          LINKEDIN_LOOKBACK_DAYS:   "7"
          # Auto-injected by Actions; used to commit images via Contents API
          GITHUB_TOKEN:             ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:        ${{ github.repository }}
        run: python linkedin_bot.py
